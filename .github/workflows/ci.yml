# Runs on every PR and on pushes to main: static analysis, unit tests, and a
# build of both the :sdk library and the :sample app. Mirrors the JDK/Gradle
# setup used by release-please.yml so local, CI, and release builds stay aligned.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# A new push to the same ref supersedes in-flight runs, saving runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Android lint (:sdk + :sample)
        run: ./gradlew lint --stacktrace

      - name: Unit tests (:sdk + :sample)
        run: ./gradlew test --stacktrace

      - name: Assemble :sdk (release) + :sample (debug)
        run: ./gradlew :sdk:assembleRelease :sample:assembleDebug --stacktrace

      - name: Upload lint & test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14
